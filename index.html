<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="mFwR606hXXwz-ZSPnFJbOl8vk5wOYUS0NvqlURyRFzA" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original Songs of A.K Power</title>
    <style>
        :root {
            --bg-deep: #030712;
            --bg-card: rgba(255, 255, 255, 0.02);
            --border-color: rgba(255, 255, 255, 0.05);
            --accent-yellow: #f59e0b;
            --accent-blue: #3b82f6;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(245, 158, 11, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            text-align: center;
            padding: 60px 20px;
            margin: 0;
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        /* Luxury Header */
        header {
            max-width: 1100px;
            margin: 0 auto 60px auto;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 30%, #93c5fd 70%, #fcd34d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .subtitle-container p {
            color: var(--text-muted);
            font-size: 1.15rem;
            margin: 5px 0;
            font-weight: 400;
        }

        /* Multi-Million Dollar Feature: Album Carousel Showcase */
        .album-showcase-container {
            max-width: 1100px;
            margin: 0 auto 60px auto;
            text-align: left;
        }

        .section-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-yellow);
            margin-bottom: 20px;
            font-weight: 700;
            display: block;
        }

        .album-navigation {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 15px;
            scroll-behavior: smooth;
        }

        /* Hide horizontal scrollbar functionality */
        .album-navigation::-webkit-scrollbar {
            height: 4px;
        }
        .album-navigation::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .album-tab-card {
            min-width: 200px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .album-tab-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-4px);
            background: rgba(59, 130, 246, 0.02);
        }

        .album-tab-card.active {
            border-color: var(--accent-yellow);
            background: rgba(245, 158, 11, 0.04);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.05);
        }

        .album-tab-art {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111827;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .album-tab-card h4 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-tab-card span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Dynamic Music Track Grid */
        .main-content-area {
            max-width: 1100px;
            margin: 0 auto;
            text-align: left;
        }

        .dynamic-album-heading {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
            margin: 0 0 30px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dynamic-album-heading::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color), transparent);
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Premium Track Card Box */
        .track-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .track-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 30px 60px rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* System Highlight Active Playing Card */
        .track-card.playing {
            border-color: var(--accent-yellow) !important;
            box-shadow: 0 30px 60px rgba(245, 158, 11, 0.12) !important;
            background: rgba(245, 158, 11, 0.02);
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #0f172a;
            border-radius: 16px;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }

        .track-info h3 {
            margin: 0 0 4px 0;
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
        }

        .track-info p {
            margin: 0 0 20px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            letter-spacing: 0.03em;
        }

        audio {
            width: 100%;
            margin-bottom: 20px;
        }

        /* High-End Download Button Interaction */
        .download-btn {
            display: block;
            text-align: center;
            padding: 14px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: auto;
        }

        .download-btn:hover {
            background: var(--accent-yellow);
            color: #000000;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
        }

        /* Standby Status Template Display */
        .empty-state {
            grid-column: 1 / -1;
            padding: 80px 20px;
            text-align: center;
            background: var(--bg-card);
            border: 1px dashed var(--border-color);
            border-radius: 24px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        /* Bottom Minimalist Footer */
        footer {
            margin-top: 120px;
            padding: 40px 20px;
            border-top: 1px solid var(--border-color);
            color: #4b5563;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            font-style: italic;
        }
    </style>
</head>
